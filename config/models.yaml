# Model assignments per node
# size_gb is approximate file size at Q4 quant
# source: ollama = pull directly; hf = download GGUF from HuggingFace then ollama create

models:
  # Models runnable on all nodes
  common:
    - name: qwen2.5-coder:7b
      ollama_tag: qwen2.5-coder:7b
      source: ollama
      size_gb: 5
    - name: qwen3.5:9b
      ollama_tag: qwen3.5:9b
      source: ollama
      size_gb: 7

  # Needs 20GB+ VRAM or unified memory
  mid_tier:
    - name: qwen2.5-coder:14b
      ollama_tag: qwen2.5-coder:14b
      source: ollama
      size_gb: 9
    - name: qwen3.5:27b
      ollama_tag: qwen3.5:27b
      source: hf
      hf_repo: bartowski/Qwen_Qwen3.5-27B-GGUF
      hf_file: Qwen_Qwen3.5-27B-Q4_K_M.gguf
      size_gb: 16
    - name: qwen3.5:35b-a3b
      ollama_tag: qwen3.5:35b-a3b
      source: ollama
      size_gb: 23
      notes: "MoE — only 3B active, very efficient"

  # Large models — unified memory nodes only (Strix/GB10)
  large:
    - name: deepseek-r1:70b
      ollama_tag: deepseek-r1:70b
      source: ollama
      size_gb: 42
      nodes: [bosgame-m5, lenovo-gb10]
    - name: llama3.3:70b
      ollama_tag: llama3.3:70b
      source: ollama
      size_gb: 42
      nodes: [bosgame-m5, lenovo-gb10]
    - name: qwen3-coder-next
      ollama_tag: qwen3-coder-next:latest
      source: ollama
      size_gb: 51
      nodes: [bosgame-m5, lenovo-gb10]
      notes: "80B MoE — key agentic benchmark"
    - name: gpt-oss:120b
      ollama_tag: gpt-oss:120b
      source: ollama
      size_gb: 65
      nodes: [bosgame-m5, lenovo-gb10]
    - name: qwen3.5:122b
      ollama_tag: qwen3.5:122b
      source: ollama
      size_gb: 81
      nodes: [bosgame-m5, lenovo-gb10]
      notes: "MoE — 10B active params"

# Per-node model assignments
node_models:
  nvidia-ai:
    - qwen2.5-coder:7b
    - qwen2.5-coder:14b
    - qwen3.5:9b
    - qwen3.5:35b-a3b

  bosgame-m5:
    - qwen2.5-coder:7b
    - qwen2.5-coder:14b
    - qwen3.5:9b
    - qwen3.5:27b
    - qwen3.5:35b-a3b
    - deepseek-r1:70b
    - llama3.3:70b
    - qwen3-coder-next
    - gpt-oss:120b
    - qwen3.5:122b

  lenovo-gb10:
    - qwen2.5-coder:7b
    - qwen3.5:9b
    - qwen3.5:27b
    - qwen3.5:35b-a3b
    - deepseek-r1:70b
    - llama3.3:70b
    - qwen3-coder-next
    - gpt-oss:120b
    - qwen3.5:122b
